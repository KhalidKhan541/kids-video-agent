name: Create Kids Video

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Video topic (e.g., "learn colors", "animal sounds")'
        required: true
        type: string
      language:
        description: 'Language code'
        required: false
        default: 'en'
        type: choice
        options:
          - 'en'
          - 'hi'
          - 'ur'
      num_scenes:
        description: 'Number of scenes (40 for 7-min video)'
        required: false
        default: '40'
        type: string

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Determine inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "topic=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
            echo "language=${{ github.event.inputs.language }}" >> $GITHUB_OUTPUT
            echo "scenes=${{ github.event.inputs.num_scenes }}" >> $GITHUB_OUTPUT
          else
            TOPICS=("learn colors" "animal sounds" "counting numbers" "shapes" "the solar system" "good manners" "parts of the body" "fruits and vegetables" "days of the week" "opposites")
            IDX=$((RANDOM % ${#TOPICS[@]}))
            echo "topic=${TOPICS[$IDX]}" >> $GITHUB_OUTPUT
            echo "language=en" >> $GITHUB_OUTPUT
            echo "scenes=40" >> $GITHUB_OUTPUT
          fi

      - name: Health Check
        run: |
          python harness/health_check.py quick || {
            echo "Health check failed — aborting pipeline"
            exit 1
          }

      - name: Generate video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python run_pipeline.py \
            --topic "${{ steps.inputs.outputs.topic }}" \
            --lang "${{ steps.inputs.outputs.language }}" \
            --scenes "${{ steps.inputs.outputs.scenes }}" \
            --output ./output

      - name: Verify output
        id: verify
        run: |
          VIDEO_COUNT=$(find ./output -name "*.mp4" 2>/dev/null | wc -l)
          if [ "$VIDEO_COUNT" -eq 0 ]; then
            echo "error=No video files found" >> $GITHUB_OUTPUT
            echo "::error::No video files generated"
            exit 1
          fi
          echo "video_count=$VIDEO_COUNT" >> $GITHUB_OUTPUT
          echo "video_path=$(find ./output -name "*.mp4" | head -1)" >> $GITHUB_OUTPUT

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: kids-video-${{ steps.inputs.outputs.topic }}-${{ github.run_number }}
          path: output/**/*.mp4
          retention-days: 30
          if-no-files-found: error

      - name: Generate summary
        if: always()
        run: |
          echo "## Video Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Topic** | ${{ steps.inputs.outputs.topic }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Language** | ${{ steps.inputs.outputs.language }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Scenes** | ${{ steps.inputs.outputs.scenes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Duration** | ~7 minutes |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
